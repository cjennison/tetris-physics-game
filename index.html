<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="screen-orientation" content="landscape" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>TRASH</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
    #game-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    canvas { display: block; }
    /* Landscape lock hint for portrait mode */
    #rotate-hint {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: #111; color: #667; z-index: 99999;
      font-family: monospace; font-size: 18px;
      justify-content: center; align-items: center; flex-direction: column; gap: 10px;
    }
    @media (orientation: portrait) {
      #rotate-hint { display: flex; }
      #game-container { display: none; }
      #touch-controls { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="rotate-hint">📱 Rotate your device to landscape</div>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
